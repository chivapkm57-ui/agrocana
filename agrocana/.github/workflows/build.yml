# ============================================================
# GITHUB ACTIONS: compila automaticamente el APK en la nube
# ============================================================
# Este archivo usa la imagen Docker OFICIAL de Buildozer
# (publicada por el equipo de Kivy), ya lista para usar.
# Esto evita problemas de construir una imagen desde cero.

name: Compilar APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # agrega un boton "Run workflow" para compilar manualmente

jobs:
  build-android:
    name: Compilar para Android
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el codigo del repositorio
        uses: actions/checkout@v4

      - name: Descargar la imagen oficial de Buildozer
        run: docker pull kivy/buildozer:latest

      - name: Compilar el APK
        run: |
          docker run --rm \
            --volume "${{ github.workspace }}":/home/user/hostcwd \
            kivy/buildozer:latest android debug

      - name: Subir el APK como archivo descargable
        uses: actions/upload-artifact@v4
        with:
          name: agrocana-apk
          path: bin/*.apk